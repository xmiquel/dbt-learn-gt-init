snapshots:
  - name: orders_snapshot
    relation: source('jaffle_shop', 'orders')
    description: A snapshot of the orders table
    config:
      database: analytics
      schema: snapshot
      strategy: check
      unique_key: ID
      check_cols: # tienen que respetar mayúsculas con la bbdd
        - USER_ID 
        - ORDER_DATE
        - STATUS
      hard_deletes: ignore
      dbt_valid_to_current: "to_date('2199-12-31')"