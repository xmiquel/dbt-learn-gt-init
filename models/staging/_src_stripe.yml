version: 2

sources:
  - name: stripe
    database: raw
    schema: stripe
    tables: 
      - name: payment
        config:
          freshness:
            warn_after: {count: 24, period: hour}
            error_after:
              count: 48
              period: day
        columns:
          - name: id
            data_tests:
              - unique
              - not_null
