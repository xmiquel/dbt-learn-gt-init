version: 2

sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables: 
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: primary key
            data_tests:
              - unique
              - not_null
          
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: day
      - name: orders
        config:
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: day
# esto funcionaría con una columna existente, pero en databricks no se llama así o directamente funciona sin esto y pilla el updated at de los details de la tabla:
#          loaded_at_field: _etl_loaded_at
        

