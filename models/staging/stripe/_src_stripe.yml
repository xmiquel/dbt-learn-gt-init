version: 2

sources:
  - name: stripe
    database: raw
    schema: stripe
    tables:
      - name: payment
        config:
          loaded_at_field: cast(created as timestamp)
          freshness:
            warn_after:
              count: 2400
              period: day
            error_after:
              count: 4000
              period: day
        columns:
          - name: id
            data_tests:
              - unique
              - not_null