seeds:
  - name: employees
    description: "A seed file containing employee assignements to customers."
    columns:
      - name: employee_id
        description: "The unique identifier for each employee."
        data_tests:
          - unique
          - not_null
      - name: email
        description: "The employee email."
      - name: customer_id
        description: "The unique identifier for each customer assigned to an employee."